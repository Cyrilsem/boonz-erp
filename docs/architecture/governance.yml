# -----------------------------------------------------------------------------
# Write-detection surface
# -----------------------------------------------------------------------------

write_detection:

  fe:
    paths:
      - boonz-erp/src/**/*.ts
      - boonz-erp/src/**/*.tsx
    excluded_paths:
      - boonz-erp/src/types/**       # type defs are not writes
      - boonz-erp/src/**/*.test.ts
      - boonz-erp/src/**/*.test.tsx
    write_patterns:
      # %TABLE% is templated per protected entity (including appendix_a_alias)
      - '\.from\([''"]%TABLE%[''"]\)\.update\('
      - '\.from\([''"]%TABLE%[''"]\)\.insert\('
      - '\.from\([''"]%TABLE%[''"]\)\.upsert\('
      - '\.from\([''"]%TABLE%[''"]\)\.delete\('

  n8n:
    source: supabase_introspection
    query: |
      -- The lint script runs this against the n8n metadata schema.
      -- Replace %TABLE% with each protected entity name + alias.
      SELECT workflow_id, node_name, query
      FROM n8n_workflows_nodes
      WHERE node_type IN ('postgres', 'supabase')
        AND query ~* '\b(INSERT INTO|UPDATE|DELETE FROM)\s+(public\.)?%TABLE%\b';
    note: >
      n8n introspection requires service_role read access on n8n_workflows_*
      metadata tables. If that's not exposed, lint falls back to scanning
      exported workflow JSON in boonz-erp/n8n/exports/*.json.

  edge_functions:
    paths:
      - boonz-erp/supabase/functions/**/*.ts
    excluded_functions:
      # These are the canonical thin-wrapper edge fns (Article 9 compliant).
      - repurpose-machine
    write_patterns:
      - '\.from\([''"]%TABLE%[''"]\)\.(update|insert|upsert|delete)\('

  pg_cron:
    source: supabase_introspection
    query: |
      SELECT jobid, schedule, command
      FROM cron.job
      WHERE command ~* '\b(INSERT INTO|UPDATE|DELETE FROM)\s+(public\.)?%TABLE%\b';
    note: >
      Cron jobs that call RPCs (e.g., SELECT refresh_sales_aggregated()) are
      compliant. Only direct INSERT/UPDATE/DELETE in cron.command is flagged.

  warehouse_inventory_status_special:
    description: >
      Article 6 — warehouse_inventory.status is manager-only. Lint MUST
      additionally flag any write to warehouse_inventory that mentions the
      `status` column, even via a canonical writer, unless the writer is
      explicitly on the allow_list for status mutation. As of v1, NO writer
      is allowed to mutate status from automation.
    additional_pattern: '\.from\([''"]warehouse_inventory[''"]\)\.update\([^)]*status[^)]*\)'
    severity: ERROR

# -----------------------------------------------------------------------------
# CI behavior matrix
# -----------------------------------------------------------------------------

ci_modes:
  warn:
    description: >
      Day-1 mode. Lint runs on every PR. ERROR-severity violations are
      posted as a PR comment. Pre-existing violations (in baseline_file)
      are silenced — only NEW violations introduced by the PR are shown
      under "NEW VIOLATIONS". Old violations are listed under "BASELINE
      (pre-existing — Phase B queue)".
    blocks_pr: false
    posts_comment: true
    silences_baseline: true
    daily_cron_scan: true   # additionally scans n8n + pg_cron daily for drift
    daily_cron_output: docs/architecture/A.6_drift_$(date).md  # markdown report
                                                                # committed to repo

  fail:
    description: >
      Phase C target mode. Lint runs on every PR. ERROR-severity violations
      block the PR. Baseline file is no longer silenced — every entry must
      have either landed (and disappeared from the codebase) or been moved
      to the explicit allow_list with a reason and expiry. Cutover requires
      a 14-day grace window where new violations are loud-warned but not
      yet blocked.
    blocks_pr: true
    posts_comment: true
    silences_baseline: false
    grace_period_days: 14
    grace_period_starts_on: cutover_date
    daily_cron_scan: true

