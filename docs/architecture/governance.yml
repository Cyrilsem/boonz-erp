# =============================================================================
# Boonz Backend Constitution — Article 15 Governance Configuration
# =============================================================================
#
# This file is the machine-readable source of truth for the A.6 CI lint.
# Every PR touching the boonz-erp repo (and every daily cron scan of n8n /
# pg_cron / edge functions) is checked against this spec. Direct writes to
# protected tables that bypass the canonical RPC are flagged.
#
# Schema fields:
#   version              schema version (bump on breaking changes)
#   mode                 'warn' | 'fail' — warn = comment only, fail = block PR
#   cutover_date         ISO date when fail-mode goes live (null until Phase C)
#   baseline_file        path to JSON baseline of pre-existing violations (warn
#                          mode silences these; only NEW violations get noisy)
#   protected_entities   array of protected table specs
#   severity_levels      ERROR / WARN / ALLOW semantics
#   write_detection      patterns + paths the lint scans
#   ci_modes             behavior matrix for warn vs fail
#   amendments_open      Article 15 amendment tickets yet to land
#
# Per-entity fields:
#   name                 the table name AS IT EXISTS IN postgres (post Amend-001)
#   appendix_a_alias     historical name from Constitution Appendix A, if renamed
#   canonical_writers    {rpcs: [...], edge_functions: [...]}
#   severity_per_surface severity for FE / n8n / edge-fn-other / pg_cron writes
#   allow_list           [{path, line, reason, expiry}] — explicit exceptions
#   notes                free-text architectural context
#
# Edits to this file are an Article 15 amendment by definition. PRs editing
# governance.yml require a CHANGELOG entry citing the amendment number.
#
# =============================================================================

version: 1
mode: warn
cutover_date: null  # set on Phase C kickoff; until then, mode=warn is enforced
                     # regardless of this field's value (sanity guard in lint)
baseline_file: docs/architecture/A.6_baseline.json

# -----------------------------------------------------------------------------
# Severity levels
# -----------------------------------------------------------------------------

severity_levels:
  ERROR:
    description: >
      Forbidden direct write to a protected table. Must route through the
      canonical RPC. In warn mode: PR comment (non-blocking) listing the
      violation + the canonical RPC to call. In fail mode: PR is blocked.
    warn_mode_action: comment
    fail_mode_action: block
  WARN:
    description: >
      Direct write tolerated under specific conditions (e.g., admin-only
      surface that pre-dates the canonical RPC). Flagged in CI but never
      blocks. Used during phased migration to avoid blocking on already-
      known violations being actively rewired.
    warn_mode_action: comment
    fail_mode_action: comment
  ALLOW:
    description: >
      Explicit, dated exception. Required fields: reason, expiry, owner.
      The lint silences the matched line until expiry. Past-expiry ALLOW
      entries auto-promote to ERROR.
    warn_mode_action: silent
    fail_mode_action: silent

